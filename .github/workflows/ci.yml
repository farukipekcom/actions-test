name: CI

on:
  push:

jobs:
  artifact-demo:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create report
        run: |
          mkdir reports
          echo "Job Flow CI Report" > reports/report.txt
          echo "Repository: ${{ github.repository }}" >> reports/report.txt
          echo "Branch: ${{ github.ref_name }}" >> reports/report.txt
          echo "Actor: ${{ github.actor }}" >> reports/report.txt

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: ci-report
          path: reports/report.txt
